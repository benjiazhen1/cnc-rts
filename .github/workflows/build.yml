name: Build Godot Project

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barthel/godot-export:4.2.2
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build for Windows
        run: |
          mkdir -p builds
          godot4 --headless --export-release "Windows Desktop" builds/game.exe
      
      - name: Build for HTML5
        run: |
          godot4 --headless --export-release "HTML5" builds/index.html
      
      - uses: actions/upload-artifact@v4
        with:
          name: builds
          path: builds/
